<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#22902;&#40857;&#25447;&#33145;&#22823;&#31505;</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff;
      color: #222;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    main {
      width: min(92vw, 880px);
      display: grid;
      gap: 0;
      justify-items: center;
      text-align: center;
    }

    .video-frame {
      width: min(82vw, 560px);
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    @media (max-width: 560px) {
      main {
        width: min(94vw, 880px);
      }

      .video-frame {
        width: min(90vw, 560px);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="video-frame">
      <video id="laughVideo" src="nailong.mp4" autoplay loop playsinline preload="auto"></video>
    </div>
  </main>

  <script>
    const video = document.querySelector("#laughVideo");

    video.volume = 1;
    video.muted = false;

    const playWithSound = async () => {
      video.muted = false;

      try {
        await video.play();
      } catch {
        document.body.addEventListener("click", async () => {
          video.muted = false;
          await video.play();
        }, { once: true });
      }
    };

    playWithSound();
  </script>
</body>
</html>
